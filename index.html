<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Distributor Deal Portal — Ronnoco Beverage Solutions</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤝</text></svg>"/>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;color:#111827;font-size:15px;min-height:100vh}

/* HEADER — dark navy, white text only */
.top{background:#0f2347;display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.5rem;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px}
.top-left{display:flex;align-items:center;gap:14px}
.logo-img{height:30px;width:auto;display:block;filter:brightness(0) invert(1)}
.logo-divider{width:1px;height:28px;background:rgba(255,255,255,.2)}
.portal-title-main{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.01em;line-height:1.1}
.portal-title-sub{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.1em}
.roles{display:flex;gap:2px;background:rgba(255,255,255,.1);padding:3px;border-radius:7px}
.role-btn{font-size:12px;padding:5px 13px;border:none;border-radius:5px;background:transparent;color:rgba(255,255,255,.55);cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;white-space:nowrap}
.role-btn.on{background:#fff;color:#0f2347;font-weight:700}
.role-btn:hover:not(.on){background:rgba(255,255,255,.12);color:#fff}
.icon-btn{font-size:13px;padding:6px 13px;border:1px solid rgba(255,255,255,.25);border-radius:7px;background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.icon-btn:hover{background:rgba(255,255,255,.18)}

/* TOOLBAR — white bar below header */
.sub-bar{background:#fff;border-bottom:1px solid #e5e7eb;display:flex;gap:8px;padding:.6rem 1.5rem;flex-wrap:wrap;align-items:center}

/* CONTENT */
.content{padding:1.5rem;max-width:1440px;margin:0 auto}
.wrap{max-width:1440px;margin:0 auto;padding:0 1.5rem 4rem}

/* BUTTONS — light default, navy/color fills for actions */
.btn{font-size:13px;padding:7px 15px;border:1px solid #d1d5db;border-radius:7px;background:#fff;color:#374151;cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap;transition:all .12s}
.btn:hover{background:#f9fafb;border-color:#9ca3af}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-navy{background:#0f2347;color:#fff;border-color:#0f2347}.btn-navy:hover{background:#1b3a6b}
.btn-blue{background:#1d4ed8;color:#fff;border-color:#1d4ed8}.btn-blue:hover{background:#1e40af}
.btn-green{background:#059669;color:#fff;border-color:#059669}.btn-green:hover{background:#047857}
.btn-red{background:#dc2626;color:#fff;border-color:#dc2626}.btn-red:hover{background:#b91c1c}
.btn-amber{background:#d97706;color:#fff;border-color:#d97706}.btn-amber:hover{background:#b45309}
.btn-purple{background:#7c3aed;color:#fff;border-color:#7c3aed}.btn-purple:hover{background:#6d28d9}
.btn-sm{font-size:12px;padding:5px 11px}

/* NOTICES */
.notice{font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:.8rem;border:1px solid transparent}
.n-ok{background:#ecfdf5;color:#065f46;border-color:#6ee7b7}
.n-err{background:#fef2f2;color:#991b1b;border-color:#fca5a5}
.n-info{background:#eff6ff;color:#1e40af;border-color:#bfdbfe}
.n-warn{background:#fffbeb;color:#92400e;border-color:#fde68a}

/* BADGES — colored bg always gets white text */
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;display:inline-block;white-space:nowrap;line-height:1.4}
.badge-navy{background:#0f2347;color:#fff}
.badge-blue{background:#1d4ed8;color:#fff}
.badge-green{background:#059669;color:#fff}
.badge-amber{background:#d97706;color:#fff}
.badge-red{background:#dc2626;color:#fff}
.badge-purple{background:#7c3aed;color:#fff}
.badge-gray{background:#e5e7eb;color:#374151}
.badge-teal{background:#0891b2;color:#fff}
/* Soft badges — light bg with dark text */
.badge-won{background:#d1fae5;color:#065f46}
.badge-lost{background:#fee2e2;color:#991b1b}
.badge-new{background:#fef3c7;color:#92400e}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.4rem}
.metric{background:#fff;border:1px solid #e5e7eb;border-top:3px solid #e5e7eb;border-radius:10px;padding:.9rem 1.1rem}
.metric.m-navy{border-top-color:#0f2347}
.metric.m-blue{border-top-color:#1d4ed8}
.metric.m-green{border-top-color:#059669}
.metric.m-amber{border-top-color:#d97706}
.metric.m-red{border-top-color:#dc2626}
.metric.m-purple{border-top-color:#7c3aed}
.metric.m-teal{border-top-color:#0891b2}
.metric-label{font-size:11px;color:#6b7280;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.metric-value{font-size:28px;font-weight:700;color:#111827}

/* FILTER PANEL */
.filter-panel{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:1rem 1.2rem;margin-bottom:1.2rem}
.filter-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem}
.filter-hdr-title{font-size:13px;font-weight:700;color:#111827}
.filter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}
.filter-group label{font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px}
.filter-group input,.filter-group select{width:100%;font-size:13px;padding:7px 9px;border:1px solid #d1d5db;border-radius:7px;background:#fff;color:#111827;font-family:inherit;outline:none;transition:border-color .15s}
.filter-group input:focus,.filter-group select:focus{border-color:#1d4ed8;box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.filter-summary{font-size:12px;color:#6b7280;margin-top:.6rem;padding-top:.6rem;border-top:1px solid #f3f4f6}

/* LAYOUT */
.layout{display:grid;grid-template-columns:300px 1fr;gap:14px;align-items:start}

/* SIDEBAR CARDS */
.sidebar{display:flex;flex-direction:column;gap:6px;max-height:calc(100vh - 320px);overflow-y:auto;padding-right:2px}
.lead-card{background:#fff;border:1px solid #e5e7eb;border-left:4px solid transparent;border-radius:0 8px 8px 0;padding:.85rem 1rem;cursor:pointer;transition:all .15s}
.lead-card:hover{border-left-color:#1d4ed8;border-color:#d1d5db;background:#fafafa}
.lead-card.on{border-left-color:#0f2347;background:#eff3fb;border-color:#c7d2e8}
.lead-card.lost{opacity:.5;border-left-color:#dc2626}
.card-name{font-size:14px;font-weight:700;color:#111827;margin-bottom:2px}
.card-sub{font-size:12px;color:#6b7280;line-height:1.4}
.card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;flex-wrap:wrap;gap:4px}
.prog-bar{height:3px;background:#e5e7eb;border-radius:2px;margin-top:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}
.prog-sales{background:#0f2347}
.prog-leasing{background:#7c3aed}

/* MAIN PANEL */
.main{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:1.5rem}
.main-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #e5e7eb;flex-wrap:wrap;gap:10px}
.main-name{font-size:22px;font-weight:700;color:#111827}
.main-meta{font-size:14px;color:#6b7280;margin-top:4px;line-height:1.6}

/* ROUTE TOGGLE */
.route-toggle{display:flex;gap:6px;align-items:center;margin-bottom:1rem;padding:.75rem 1rem;background:#f9fafb;border-radius:8px;border:1px solid #e5e7eb;flex-wrap:wrap}
.route-lbl{font-size:13px;font-weight:600;color:#374151;margin-right:4px}
.route-opt{font-size:12px;padding:5px 13px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;font-family:inherit;font-weight:500;color:#374151;transition:all .15s}
.route-opt:hover{background:#f3f4f6}
.route-opt.on-sales{background:#0f2347;color:#fff;border-color:#0f2347}
.route-opt.on-leasing{background:#7c3aed;color:#fff;border-color:#7c3aed}

/* ASSIGN BOX */
.assign-box{display:flex;gap:8px;align-items:center;margin-bottom:1rem;padding:.75rem 1rem;background:#fffbeb;border-radius:8px;border:1px solid #fde68a;flex-wrap:wrap}
.assign-lbl{font-size:13px;font-weight:700;color:#92400e;white-space:nowrap}
.assign-inp{font-size:14px;padding:7px 10px;border:1px solid #fde68a;border-radius:7px;background:#fff;color:#111827;font-family:inherit;flex:1;min-width:140px;outline:none}
.assign-inp:focus{border-color:#f59e0b}

/* PIPELINE */
.phase-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#9ca3af;margin:1rem 0 8px;display:flex;align-items:center;gap:8px}
.phase-title::after{content:'';flex:1;height:1px;background:#e5e7eb}
.pipeline{display:flex;align-items:flex-start;overflow-x:auto;padding-bottom:8px}
.pipe-step{display:flex;flex-direction:column;align-items:center;min-width:82px;position:relative}
.pipe-step+.pipe-step::before{content:'';position:absolute;top:15px;left:calc(-50%);width:100%;height:2px;background:#e5e7eb;z-index:0}
.pipe-dot{width:32px;height:32px;border-radius:50%;background:#f3f4f6;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-size:13px;position:relative;z-index:1;flex-shrink:0}
.pipe-dot.done-s{background:#dbeafe;border-color:#1d4ed8}
.pipe-dot.done-l{background:#ede9fe;border-color:#7c3aed}
.pipe-dot.cur-s{background:#0f2347;border-color:#0f2347;box-shadow:0 0 0 4px rgba(15,35,71,.12)}
.pipe-dot.cur-l{background:#7c3aed;border-color:#6d28d9;box-shadow:0 0 0 4px rgba(124,58,237,.12)}
.pipe-dot.lock{opacity:.25}
.pipe-dot.lost-dot{background:#fee2e2;border-color:#dc2626}
.pipe-name{font-size:9px;color:#9ca3af;text-align:center;margin-top:5px;line-height:1.3;max-width:80px}
.pipe-name.done-s,.pipe-name.cur-s{color:#1e40af;font-weight:700}
.pipe-name.done-l,.pipe-name.cur-l{color:#6d28d9;font-weight:700}

/* JUMP BOX */
.jump-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:1rem 1.1rem;margin:.8rem 0}
.jump-title{font-size:14px;font-weight:600;color:#111827;margin-bottom:.6rem}
.jump-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.jump-sel{font-size:14px;padding:7px 11px;border:1px solid #d1d5db;border-radius:7px;background:#fff;color:#111827;font-family:inherit;flex:1;min-width:200px;outline:none}
.jump-sel:focus{border-color:#1d4ed8}
.action-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:.8rem}

/* SECTIONS */
.section{border-top:1px solid #f3f4f6;padding-top:1rem;margin-top:1rem}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;margin-bottom:.8rem}

/* EDITABLE FIELDS */
.edit-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:.6rem}
.edit-field{display:flex;flex-direction:column;gap:4px}
.edit-label{font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.05em}
.edit-inp{font-size:14px;padding:7px 10px;border:1px solid #d1d5db;border-radius:7px;background:#fff;color:#111827;font-family:inherit;outline:none;transition:border-color .15s}
.edit-inp:focus{border-color:#1d4ed8;box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.edit-inp[readonly]{background:#f9fafb;color:#6b7280}

/* DATA TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:.5rem}
.data-table tr:nth-child(odd) td{background:#f9fafb}
.data-table td{padding:7px 10px;border-bottom:1px solid #f3f4f6;vertical-align:top;color:#111827}
.data-table td:first-child{color:#6b7280;font-weight:600;width:38%;white-space:nowrap}

/* ACTIVITY LOG */
.log-box{max-height:180px;overflow-y:auto;margin-top:.5rem}
.log-row{font-size:12px;padding:6px 0;border-bottom:1px solid #f3f4f6;color:#374151;display:flex;gap:10px}
.log-time{flex-shrink:0;min-width:130px;color:#9ca3af}

/* EMPTY STATE */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;color:#9ca3af;font-size:15px;gap:10px;text-align:center}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(15,35,71,.35);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:#fff;border-radius:12px;padding:1.5rem;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;border:1px solid #e5e7eb;box-shadow:0 8px 40px rgba(15,35,71,.15)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding-bottom:.8rem;border-bottom:1px solid #e5e7eb}
.modal-title{font-size:17px;font-weight:700;color:#111827}
.modal-close{background:none;border:none;font-size:20px;color:#9ca3af;cursor:pointer;line-height:1;padding:2px 6px;border-radius:4px}
.modal-close:hover{background:#f3f4f6;color:#374151}
.field-label{font-size:13px;font-weight:600;color:#374151;margin:.8rem 0 4px;display:block}
.field-inp{width:100%;font-size:14px;padding:8px 11px;border:1px solid #d1d5db;border-radius:7px;background:#fff;color:#111827;font-family:inherit;outline:none;transition:all .15s}
.field-inp:focus{border-color:#1d4ed8;box-shadow:0 0 0 3px rgba(29,78,216,.08)}
textarea.field-inp{resize:vertical;min-height:120px;line-height:1.6}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:1.2rem;padding-top:1rem;border-top:1px solid #e5e7eb}

/* LOST BOX */
.lost-box{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:.9rem;margin-top:.8rem;font-size:14px;color:#991b1b;line-height:1.5}

/* PAGES */
.page{display:none;min-height:100vh}
.page.on{display:block}

/* SETTINGS */
.settings-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:1.5rem;max-width:540px;margin:1.5rem auto}
.settings-title{font-size:19px;font-weight:700;color:#111827;margin-bottom:.3rem}
.settings-sub{font-size:13px;color:#6b7280;margin-bottom:1.2rem;line-height:1.6}
.settings-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;margin:1.2rem 0 .6rem;padding-top:1rem;border-top:1px solid #f3f4f6}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.dot-g{background:#059669}.dot-r{background:#dc2626}.dot-y{background:#d97706}

/* LOCK SCREEN */
.lock-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f2347}
.lock-card{background:#fff;border-radius:12px;padding:2.5rem;width:100%;max-width:380px;text-align:center}
.lock-logo{width:56px;height:56px;border-radius:50%;background:#eff6ff;display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem}

/* RESPONSIVE */
@media(max-width:700px){
  .layout{grid-template-columns:1fr}
  .edit-grid{grid-template-columns:1fr}
  .content{padding:1rem}
  .sub-bar{padding:.5rem 1rem}
  .top{padding:.7rem 1rem}
}
</style>
</head>
