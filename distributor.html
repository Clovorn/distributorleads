<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Distributor View - Protected</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8fafc;color:#0f172a}
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{width:100%;max-width:400px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;box-shadow:0 8px 24px rgba(15,23,42,.08)}
    h1{font-size:18px;margin:0 0 6px}
    p{font-size:13px;color:#475569;margin:0 0 14px}
    label{font-size:12px;color:#334155;display:block;margin:8px 0 4px}
    input{width:100%;padding:9px 10px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px}
    input:focus{outline:none;border-color:#3b82f6}
    button{width:100%;margin-top:12px;padding:10px;border:0;border-radius:8px;background:#1d4ed8;color:#fff;font-weight:600;cursor:pointer}
    button:hover{background:#1e40af}
    .err{margin-top:10px;font-size:12px;color:#b91c1c;display:none}
    .hint{margin-top:8px;font-size:12px;color:#64748b}
    .app{display:none;height:100%}
    .top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#0f172a;color:#fff}
    .title{font-size:13px;font-weight:600}
    .meta{font-size:11px;opacity:.85;margin-top:2px}
    .logout{background:#334155;border:0;color:#fff;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px}
    iframe{width:100%;height:calc(100vh - 44px);border:0}
  </style>
</head>
<body>
  <div id="login" class="wrap">
    <div class="card">
      <h1>Distributor Access</h1>
      <p>Sign in with your Supabase user to view your distributor-scoped live dashboard.</p>
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="username" />
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" />
      <button onclick="login()">Sign In</button>
      <div class="hint">Scope is derived from your Supabase user metadata.</div>
      <div id="err" class="err">Invalid login or missing distributor scope metadata.</div>
    </div>
  </div>

  <div id="app" class="app">
    <div class="top">
      <div>
        <div class="title">Distributor Live View</div>
        <div id="who" class="meta"></div>
      </div>
      <button class="logout" onclick="logout()">Sign Out</button>
    </div>
    <iframe id="frame" src=""></iframe>
  </div>

  <script>
    const SB_URL = 'https://opnpyunbccifkdnbljsz.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wbnB5dW5iY2NpZmtkbmJsanN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NTAzODMsImV4cCI6MjA5MzMyNjM4M30.UPu8TcE7PoVV4SqzUVlTQIsy_sgszylY988iZlOfBlk';
    const sb = supabase.createClient(SB_URL, SB_KEY);
    const programLabel = p => (p === 'Java Select' ? 'HT Hackney' : p);

    function showApp(){ document.getElementById('login').style.display='none'; document.getElementById('app').style.display='block'; }
    function showLogin(){ document.getElementById('app').style.display='none'; document.getElementById('login').style.display='flex'; }
    function setError(msg){ const e=document.getElementById('err'); e.textContent=msg; e.style.display='block'; }
    function clearError(){ document.getElementById('err').style.display='none'; }

    function resolveScope(user){
      const md = Object.assign({}, user?.app_metadata || {}, user?.user_metadata || {});
      const scope = (md.program_source || md.program || md.scope || 'Java Select').toString().trim();
      const distributor = (md.distributor || md.distributor_name || '').toString().trim();
      const warehouse = (md.distributor_warehouse || md.warehouse || '').toString().trim();
      const repOnly = !!md.rep_only;
      const distEmail = repOnly ? (user?.email || '') : '';
      return { scope, distributor, warehouse, distEmail };
    }

    function loadScopedApp(user){
      const { scope, distributor, warehouse, distEmail } = resolveScope(user);
      if(!scope){
        setError('Your account is missing a distributor scope (program).');
        showLogin();
        return;
      }
      const params = new URLSearchParams({
        role: 'distributor',
        scope
      });
      if(distributor) params.set('dist_name', distributor);
      if(warehouse) params.set('dist_wh', warehouse);
      if(distEmail) params.set('dist_email', distEmail);

      document.getElementById('frame').src = '/index.html?' + params.toString();
      document.getElementById('who').textContent = `${user.email} · ${programLabel(scope)}${distributor ? ' · ' + distributor : ''}${warehouse ? ' · ' + warehouse : ''}`;
      showApp();
    }

    async function login(){
      clearError();
      const email = (document.getElementById('email').value || '').trim();
      const password = document.getElementById('password').value || '';
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if(error || !data?.user){
        setError('Invalid email/password for Supabase login.');
        return;
      }
      loadScopedApp(data.user);
    }

    async function logout(){
      await sb.auth.signOut();
      showLogin();
      document.getElementById('frame').src = '';
    }

    (async () => {
      const { data } = await sb.auth.getSession();
      if(data?.session?.user) loadScopedApp(data.session.user);
      else showLogin();
    })();
  </script>
</body>
</html>
